# Docker内蔵DNS（127.0.0.11）で動的名前解決
# nginx起動時にupstreamが未起動でも落ちないようにする
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 8000;
    server_name _;

    # ============================================
    # /auth/v1/* → GoTrue (認証サービス) :9999
    # ============================================
    location /auth/v1/ {
        set $auth_upstream http://auth:9999;
        proxy_pass $auth_upstream/;

        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Authorization     $http_authorization;
        proxy_pass_header Authorization;
        proxy_pass_header apikey;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ============================================
    # /rest/v1/* → PostgREST (データベースAPI) :3000
    # ============================================
    location /rest/v1/ {
        set $rest_upstream http://rest:3000;
        proxy_pass $rest_upstream/;

        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  Authorization     $http_authorization;
        proxy_pass_header Authorization;
        proxy_pass_header apikey;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type, Prefer, Range" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ============================================
    # ヘルスチェック
    # ============================================
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
